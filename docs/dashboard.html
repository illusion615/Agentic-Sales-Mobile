<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sales Copilot Mobile · 项目仪表盘</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6efe4; --bg2: #fffaf2;
        --surface: rgba(255, 250, 244, 0.82);
        --surface-strong: rgba(255, 255, 255, 0.94);
        --text: #211b16; --muted: #6c5e51;
        --line: rgba(73, 48, 25, 0.14);
        --accent: #bb5a2b; --accent2: #d47a32;
        --shadow: 0 24px 70px rgba(86, 52, 24, 0.13);
        --ok: #2f7d51; --warn: #9a5b10; --todo: #8a7d70; --risk: #b3402e;
      }
      html.dark {
        color-scheme: dark;
        --bg: #151313; --bg2: #221c18;
        --surface: rgba(35, 29, 25, 0.78);
        --surface-strong: rgba(28, 24, 21, 0.94);
        --text: #f5eee8; --muted: #c5b7aa;
        --line: rgba(255, 233, 209, 0.13);
        --accent: #ff9a53; --accent2: #ffbf75;
        --shadow: 0 26px 80px rgba(0, 0, 0, 0.35);
        --ok: #5fb98a; --warn: #d99a48; --todo: #b3a698; --risk: #e8775f;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; color: var(--text); line-height: 1.6;
        font-family: "Avenir Next", "PingFang SC", "Hiragino Sans GB", sans-serif;
        background:
          radial-gradient(circle at 8% 6%, rgba(255, 169, 93, 0.30), transparent 26%),
          radial-gradient(circle at 92% 16%, rgba(255, 207, 112, 0.20), transparent 24%),
          linear-gradient(180deg, var(--bg), var(--bg2));
        min-height: 100vh;
      }
      .topbar { position: sticky; top: 0; z-index: 10; backdrop-filter: blur(18px); border-bottom: 1px solid var(--line); background: color-mix(in srgb, var(--surface) 88%, transparent); }
      .topbar-inner { width: min(1180px, calc(100% - 2rem)); margin: 0 auto; height: 64px; display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
      .brand { font-weight: 850; letter-spacing: -0.02em; }
      .brand small { display: block; color: var(--muted); font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; }
      .toolbar { display: flex; gap: 0.55rem; align-items: center; }
      .toggle, .search { border: 1px solid var(--line); background: var(--surface-strong); color: var(--text); border-radius: 999px; height: 38px; font-weight: 750; }
      .toggle { width: 42px; cursor: pointer; }
      .search { padding: 0 0.95rem; min-width: 200px; font-size: 0.88rem; }
      main { width: min(1180px, calc(100% - 2rem)); margin: 0 auto; padding: 2rem 0 4rem; }
      .eyebrow { color: var(--accent); font-size: 0.78rem; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 850; }
      h1 { margin: 0.5rem 0 0.4rem; font-size: clamp(2rem, 4vw, 3.2rem); line-height: 1; letter-spacing: -0.04em; }
      p { margin: 0 0 0.8rem; color: var(--muted); }
      a { color: var(--accent); text-decoration: none; font-weight: 750; }
      a:hover { text-decoration: underline; }
      .summary { display: grid; grid-template-columns: repeat(5, minmax(0,1fr)); gap: 0.8rem; margin: 1.4rem 0; }
      .kpi { border: 1px solid var(--line); background: var(--surface); border-radius: 18px; padding: 1rem; box-shadow: var(--shadow); }
      .kpi .lbl { font-size: 0.78rem; color: var(--muted); font-weight: 750; }
      .kpi .pct { font-size: 1.9rem; font-weight: 850; letter-spacing: -0.03em; }
      .kpi .sub { font-size: 0.74rem; color: var(--muted); }
      .bar { height: 7px; border-radius: 999px; background: color-mix(in srgb, var(--muted) 24%, transparent); overflow: hidden; margin-top: 0.5rem; }
      .bar > i { display: block; height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
      .cat { margin-top: 1.8rem; }
      .cat-head { display: flex; align-items: baseline; gap: 0.7rem; margin: 0 0 0.6rem; flex-wrap: wrap; }
      .cat-head h2 { margin: 0; font-size: 1.3rem; letter-spacing: -0.02em; }
      .cat-head .desc { color: var(--muted); font-size: 0.84rem; }
      table { width: 100%; border-collapse: collapse; border: 1px solid var(--line); border-radius: 16px; overflow: hidden; background: var(--surface); box-shadow: var(--shadow); }
      th, td { text-align: left; padding: 0.6rem 0.8rem; border-bottom: 1px solid var(--line); font-size: 0.88rem; vertical-align: top; }
      th { background: var(--surface-strong); font-size: 0.74rem; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); }
      tr:last-child td { border-bottom: none; }
      td .id { font-family: "SF Mono", ui-monospace, monospace; color: var(--accent); font-weight: 800; }
      .status { font-size: 0.72rem; border-radius: 999px; padding: 0.12rem 0.6rem; font-weight: 800; white-space: nowrap; }
      .s-done { color: var(--ok); border: 1px solid var(--ok); }
      .s-prog { color: var(--warn); border: 1px solid var(--warn); }
      .s-todo { color: var(--todo); border: 1px solid var(--todo); }
      .s-risk { color: var(--risk); border: 1px solid var(--risk); }
      footer { margin-top: 3rem; border-top: 1px solid var(--line); padding-top: 1rem; color: var(--muted); font-size: 0.82rem; }
      @media (max-width: 920px) { .summary { grid-template-columns: repeat(2,1fr); } table { font-size: 0.8rem; } }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand"><small>Project Dashboard</small>Sales Copilot Mobile</div>
        <div class="toolbar">
          <input class="search" id="search" type="search" placeholder="搜索任务 / 需求…" />
          <button class="toggle" id="theme-toggle">◐</button>
        </div>
      </div>
    </header>
    <main>
      <p class="eyebrow">Tracking · 需求 / 开发 / 架构 / Review / Bug</p>
      <h1>项目仪表盘</h1>
      <p>跟踪需求、开发任务、架构、代码评审、Bug 修复的完成度。数据维护在本文件顶部 <code>DATA</code> 数组，更新后保存即可。最后更新 <span id="updated">—</span>。</p>
      <div class="summary" id="summary"></div>
      <div id="tracks"></div>
      <footer>仅供内部进度跟踪 · 公开文档另存 Study-Room · <a href="index.html">← 文档库</a></footer>
    </main>
    <script>
      // ─── 维护区：增删条目即可，status: done | prog | todo | risk ───
      const DATA = {
        updated: '2026-06-29',
        tracks: [
          { id: 'req', name: '需求', desc: 'PRD / 功能范围', items: [
            { id: 'R1', title: '双路径：AI + 传统 CRUD', status: 'prog', note: '动线设计评估中' },
            { id: 'R2', title: '多语言（zh/en/de/fr/es）', status: 'done', note: '已上线' },
            { id: 'R3', title: '商机/客户/活动 AI 洞察', status: 'done', note: '随语言生成' },
          ]},
          { id: 'dev', name: '开发任务', desc: '功能实现', items: [
            { id: 'D1', title: 'AI 洞察本地化 + 缓存按语言', status: 'done', note: '' },
            { id: 'D2', title: '时间线就地新建活动', status: 'todo', note: '待开工' },
            { id: 'D3', title: 'CRUD 入口收口（文案/位置）', status: 'todo', note: '' },
          ]},
          { id: 'arch', name: '架构', desc: '管线 / 数据层', items: [
            { id: 'A1', title: 'Frame→Orchestrator→Executor', status: 'done', note: '' },
            { id: 'A2', title: '会话状态机', status: 'done', note: '' },
          ]},
          { id: 'rev', name: 'Code Review', desc: '质量审查', items: [
            { id: 'CR1', title: '基线审查 2026-05', status: 'done', note: '' },
          ]},
          { id: 'bug', name: 'Bug 修复', desc: '缺陷', items: [
            { id: 'B1', title: '渲染循环告警 / Dialog 描述', status: 'done', note: '' },
            { id: 'B2', title: 'activities 文案硬编码英文', status: 'todo', note: '' },
          ]},
        ],
      };
      const SLABEL = { done: ['已完成','s-done'], prog: ['进行中','s-prog'], todo: ['待开始','s-todo'], risk: ['风险','s-risk'] };
      const pct = its => its.length ? Math.round(its.filter(i=>i.status==='done').length/its.length*100) : 0;
      document.getElementById('updated').textContent = DATA.updated;
      const sum = DATA.tracks.map(t=>`<div class="kpi"><div class="lbl">${t.name}</div><div class="pct">${pct(t.items)}%</div><div class="sub">${t.items.filter(i=>i.status==='done').length}/${t.items.length} 完成</div><div class="bar"><i style="width:${pct(t.items)}%"></i></div></div>`).join('');
      document.getElementById('summary').innerHTML = sum;
      const tr = DATA.tracks.map(t=>`<section class="cat"><div class="cat-head"><h2>${t.name}</h2><span class="desc">${t.desc}</span></div><table><thead><tr><th>ID</th><th>条目</th><th>状态</th><th>备注</th></tr></thead><tbody>${t.items.map(i=>`<tr data-q="${(i.id+i.title+i.note).toLowerCase()}"><td><span class="id">${i.id}</span></td><td>${i.title}</td><td><span class="status ${SLABEL[i.status][1]}">${SLABEL[i.status][0]}</span></td><td>${i.note||'—'}</td></tr>`).join('')}</tbody></table></section>`).join('');
      document.getElementById('tracks').innerHTML = tr;
      document.getElementById('search').addEventListener('input', e=>{ const q=e.target.value.toLowerCase(); document.querySelectorAll('tbody tr').forEach(r=>{ r.style.display = !q||r.dataset.q.includes(q)?'':'none'; }); });
      const tt=document.getElementById('theme-toggle'); tt.onclick=()=>document.documentElement.classList.toggle('dark');
    </script>
  </body>
</html>
