<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="50%" stop-color="#3b1d5e"/>
      <stop offset="100%" stop-color="#0F1424"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c5cff"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- arrow / momentum mark -->
  <g filter="url(#glow)">
    <path d="M120 340 L220 240 L290 310 L420 180" fill="none" stroke="url(#accent)" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="420" cy="180" r="22" fill="#22d3ee"/>
  </g>
  <!-- letter S -->
  <text x="256" y="448" text-anchor="middle" font-family="-apple-system, SF Pro Display, system-ui, sans-serif" font-weight="800" font-size="88" fill="#fff" letter-spacing="4">SALES</text>
</svg>
